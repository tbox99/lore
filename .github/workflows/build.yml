name: Build LORE

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract release notes
        id: release_notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" node <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8').split(/\r?\n/);
          const start = changelog.findIndex((line) => line.trim() === `## [${version}] — 2026-05-17` || line.trim().startsWith(`## [${version}]`));
          let body = 'See the assets below to download and install LORE.';
          if (start >= 0) {
            let end = changelog.length;
            for (let i = start + 1; i < changelog.length; i += 1) {
              if (changelog[i].startsWith('## [')) {
                end = i;
                break;
              }
            }
            body = changelog.slice(start + 1, end).join('\n').trim() || body;
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body<<RELEASE_NOTES\n${body}\nRELEASE_NOTES\n`);
          NODE

      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LORE ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false

  build-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract release notes
        id: release_notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="$VERSION" node <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8').split(/\r?\n/);
          const start = changelog.findIndex((line) => line.trim() === `## [${version}] — 2026-05-17` || line.trim().startsWith(`## [${version}]`));
          let body = 'See the assets below to download and install LORE.';
          if (start >= 0) {
            let end = changelog.length;
            for (let i = start + 1; i < changelog.length; i += 1) {
              if (changelog[i].startsWith('## [')) {
                end = i;
                break;
              }
            }
            body = changelog.slice(start + 1, end).join('\n').trim() || body;
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `body<<RELEASE_NOTES\n${body}\nRELEASE_NOTES\n`);
          NODE

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LORE ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.body }}
          releaseDraft: true
          prerelease: false

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $json = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          echo "version=$($json.version)" >> $env:GITHUB_OUTPUT

      - name: Rename portable exe with version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Copy-Item "src-tauri/target/release/LORE.exe" "src-tauri/target/release/LORE-${version}-portable-x64.exe"

      - name: Upload portable exe as release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/LORE-${{ steps.version.outputs.version }}-portable-x64.exe

      - name: Upload portable exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: LORE-${{ steps.version.outputs.version }}-portable-windows-x64
          path: src-tauri/target/release/LORE-${{ steps.version.outputs.version }}-portable-x64.exe
