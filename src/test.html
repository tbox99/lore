<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LORE Test</title>
<style>body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }</style>
</head>
<body>
<h1 style="color: #e2231a;">LORE Test Page</h1>
<p>If you see this, the webview is loading HTML correctly.</p>
<div id="tauri-status">Checking Tauri...</div>
<script>
  setTimeout(function() {
    var el = document.getElementById('tauri-status');
    if (window.__TAURI_INTERNALS__) {
      el.textContent = 'Tauri internals: AVAILABLE';
      el.style.color = '#0f0';
    } else if (window.__TAURI__) {
      el.textContent = 'Tauri global: AVAILABLE';
      el.style.color = '#0f0';
    } else {
      el.textContent = 'Tauri: NOT FOUND';
      el.style.color = '#f00';
    }
  }, 1000);
</script>
</body>
</html>
